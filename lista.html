<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Vendas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Controle de Vendas</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="cadastro.html">Cadastrar Venda</a>
            <a href="lista.html">Ver Vendas</a>
        </nav>
    </header>
    <main>
        <h2>Lista de Vendas</h2>

<input 
type="text"
id="filtro-produto"
placeholder="Buscar produto...">

        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Preço</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody></tbody> <!-- JS preenche aqui -->

        </table>

        <p id="total">Total Vendido: R$ 0.00</p>
        <section class="grafico-container">

            <a class="botao-principal" href="cadastro.html">
+ Nova Venda
</a>

<h2>Gráfico de Vendas</h2>

<canvas id="graficoVendas"></canvas>

</section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script> <!-- JS aqui para exibir a tabela -->
</body>
</html>
